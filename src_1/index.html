<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PsicoAgenda | Panel de Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/assets/css/variables.css">
    <link rel="stylesheet" href="./src/assets/css/layout.css">
    <link rel="stylesheet" href="./src/assets/css/calendar.css">
    <link rel="stylesheet" href="./src/assets/css/components.css">
</head>
<body>

    <div id="app-container">
        <header class="main-header">
            <div class="logo-circle"></div>
            <span class="consultorio-name">[Nombre del Consultorio]</span>
            <div class="header-controls">
                <div class="nav-controls">
                    <button id="btn-prev" class="btn-nav">&lt;</button>
                    <button id="btn-today" class="btn-nav">Hoy</button>
                    <button id="btn-next" class="btn-nav">&gt;</button>
                </div>
                
                <div class="view-switcher">
                    <button id="btn-view-week" class="btn-view active">Semana</button>
                    <button id="btn-view-month" class="btn-view">Mes</button>
                </div>
            </div>
            <h2 id="current-month-display">Cargando...</h2>
        </header>

        <div id="main-content">
            <aside class="sidebar-decoration"></aside>

            <section id="calendar-root"></section>
        </div>

        <div id="modal-root" class="modal-overlay hidden">
            <div class="modal-content sketch-style">
                <button type="button" id="btn-close-x" class="close-x">&times;</button>
                <header class="modal-header">
                    
                    <h3>Registro de Cita</h3>
                    
                </header>

                <form id="appointment-form">
                    <div class="form-group">
                        <label for="patient-name">Nombre del Paciente</label>
                        <input type="text" id="patient-name" placeholder="Ej: Carlos...">
                    </div>

                    <div class="form-group">
                        <label for="patient-phone">Teléfono del Paciente</label>
                        <input type="text" id="patient-phone" placeholder="Ej: 9122297...">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Hora de inicio</label>
                            <input type="text" id="start-time">
                        </div>
                        <div class="form-group">
                            <label>Hora de finalización</label>
                            <input type="text" id="end-time">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Día</label>
                            <input type="text" id="display-day">
                        </div>
                        <div class="form-group">
                            <label>Mes</label>
                            <input type="text" id="display-month" >
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="notes">Notas adicionales (opcional)</label>
                        <textarea id="notes" rows="3" placeholder="Ej: Traer expediente anterior..."></textarea>
                    </div>
                    <div class="modal-actions">
                        <button type="submit" id="btn-registrar" class="btn-main">Registrar</button>
                        <button type="button" id="btn-cancelar" class="btn-secondary">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
